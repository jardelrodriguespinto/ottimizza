spring.application.name=kanban-api

spring.datasource.url=jdbc:postgresql://localhost:5432/teste
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Performance
spring.threads.virtual.enabled=true
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Messaging
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# JWT
app.jwt.secret=${APP_JWT_SECRET:KanbanApiJWTSecretKeyForHmacSHA256DefaultDevKey}
app.jwt.expiration=86400000

# Usuário padrão (in-memory)
app.security.username=${APP_SECURITY_USERNAME:admin}
app.security.password=${APP_SECURITY_PASSWORD:admin123}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Loki
loki.url=${LOKI_URL:http://localhost:3100}
